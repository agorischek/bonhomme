services:
  postgres:
    image: postgres:17-alpine
    container_name: bonhomme-postgres
    environment:
      POSTGRES_USER: bonhomme
      POSTGRES_PASSWORD: bonhomme
      POSTGRES_DB: bonhomme
    ports:
      - "54329:5432"
    volumes:
      - bonhomme-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bonhomme -d bonhomme"]
      interval: 2s
      timeout: 2s
      retries: 20

volumes:
  bonhomme-postgres:
