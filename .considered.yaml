kinds:
    - architectural
    - permanent
    - performance
    - compatibility
exclude:
    gitignored: true
    categories:
        - assets
        - configuration
        - documentation
        - generated
        - tests
        - vendored
        - dependencies
standards:
    filesystem.bytes:
        max: 50000
    filesystem.longest_line:
        max: 140
    scc.code_lines:
        max: 500
    scc.complexity:
        max: 50
warnings:
    percentBelowMax: 10
    percentAboveMin: 10
variances:
    crates/bonhomme-core/src/core/graph.rs:
        kind: architectural
        reason: Existing cohesive module exceeds repository thresholds; decomposition should be handled as focused follow-up work.
        metrics:
            scc.complexity:
                max: 83
                reason: Semantic graph replay and validation are centralized in one core module today.
    crates/bonhomme-core/src/core/tests.rs:
        kind: permanent
        reason: Large coverage-focused test module is accepted until test fixtures are reorganized.
        metrics:
            scc.code_lines:
                max: 767
                reason: Core replay and merge scenarios live together to keep regression coverage coherent.
